<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Menu Item</title>

    <link rel="stylesheet" th:href="@{/css/menu-form.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="container">
      <h1>Menu Item</h1>

      <form
        th:action="@{/admin/menu/save}"
        th:object="${menuItem}"
        method="post"
      >
        <input type="hidden" th:field="*{id}" />

        <input
          type="text"
          th:field="*{name}"
          placeholder="Food Name"
          required
        />

        <textarea th:field="*{description}" placeholder="Description">
        </textarea>

        <input
          type="number"
          step="0.01"
          th:field="*{price}"
          placeholder="Price"
        />

        <input type="text" th:field="*{imageUrl}" placeholder="Image URL" />

        <select th:field="*{category}" required>
          <option value="">Select Category</option>

          <option value="biryani">Biryani</option>

          <option value="starters">Starters</option>

          <option value="drinks">Drinks</option>

          <option value="desserts">Desserts</option>

          <option value="main-course">Main Course</option>

          <option value="pizza">Pizza</option>

          <option value="burger">Burger</option>

          <option value="seafood">Seafood</option>
        </select>

        <select th:field="*{restaurantId}">
          <option
            th:each="restaurant : ${restaurants}"
            th:value="${restaurant.id}"
            th:text="${restaurant.name}"
          ></option>
        </select>

        <button type="submit">Save Menu Item</button>
      </form>
    </div>
  </body>
</html>
