<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FoodieGo Cart</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/cart.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <a href="/dashboard" class="back-btn"> ← Continue Shopping </a>

        <h1>🛒 Your Cart</h1>
      </div>

      <!-- CART HAS ITEMS -->

      <div class="cart-layout" th:if="${!#lists.isEmpty(cartItems)}">
        <!-- CART ITEMS -->

        <div class="cart-items">
          <div class="cart-card" th:each="item : ${cartItems}">
            <img th:src="${item.imageUrl}" th:alt="${item.name}" />

            <div class="item-details">
              <h3 th:text="${item.name}">Food Name</h3>

              <p>₹<span th:text="${item.price}"></span></p>
            </div>

            <div class="quantity-section">
              <button
                type="button"
                th:attr="onclick='updateQuantity(' + ${item.cartId} + ', `decrease`)'"
              >
                -
              </button>

              <span th:id="'qty-' + ${item.cartId}" th:text="${item.quantity}">
              </span>

              <button
                type="button"
                th:attr="onclick='updateQuantity(' + ${item.cartId} + ', `increase`)'"
              >
                +
              </button>
            </div>

            <form
              th:action="@{/cart/remove/{id}(id=${item.cartId})}"
              method="post"
            >
              <button class="remove-btn" type="submit">Remove</button>
            </form>
          </div>
        </div>

        <!-- ORDER SUMMARY -->

        <div class="summary-card">
          <h2>Order Summary</h2>

          <div class="summary-row">
            <span>Total</span>

            <span> ₹<span id="cartTotal" th:text="${total}"></span> </span>
          </div>

          <a href="/checkout" class="checkout-btn"> Proceed To Checkout </a>
        </div>
      </div>

      <!-- EMPTY CART -->

      <div class="empty-cart" th:if="${#lists.isEmpty(cartItems)}">
        <div class="empty-cart-card">
          <div class="empty-icon">🛒</div>

          <h2>Your Cart Is Empty</h2>

          <p>
            Looks like you haven't added any food yet. Explore restaurants and
            discover something delicious.
          </p>

          <a href="/dashboard" class="browse-btn"> Browse Restaurants </a>
        </div>
      </div>
    </div>

    <script>
      async function updateQuantity(cartId, action) {
        const response = await fetch(`/cart/${action}/${cartId}`, {
          method: "POST",
        });

        const data = await response.json();

        if (data.removed) {
          location.reload();
          return;
        }

        document.getElementById("qty-" + cartId).innerText = data.quantity;

        document.getElementById("cartTotal").innerText = data.total.toFixed(2);
      }
    </script>
  </body>
</html>
