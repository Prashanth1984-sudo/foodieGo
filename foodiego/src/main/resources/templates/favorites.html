<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>My Favorites</title>

    <link rel="stylesheet" th:href="@{/css/favorites.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="favorites-container">
      <div class="header">
        <h1>My Favorites</h1>

        <a href="/profile"> Back To Profile </a>
      </div>

      <div th:if="${#lists.isEmpty(favorites)}" class="empty-favorites">
        <div class="empty-icon">❤️</div>

        <h2>No Favorites Yet</h2>

        <p>Save your favourite restaurants here for quick access anytime.</p>

        <a href="/dashboard" class="browse-btn"> Browse Restaurants </a>
      </div>

      <div class="favorites-grid" th:unless="${#lists.isEmpty(favorites)}">
        <a
          class="favorite-card"
          th:each="restaurant : ${favorites}"
          th:href="@{/restaurants/{id}(id=${restaurant.id})}"
        >
          <img th:src="${restaurant.imageUrl}" th:alt="${restaurant.name}" />

          <div class="favorite-info">
            <h3
              th:text="${restaurant.name}"
              th:attr="aria-label=${restaurant.name}"
            ></h3>

            <p th:text="${restaurant.cuisine}"></p>

            <span class="rating">
              ⭐ <span th:text="${restaurant.rating}"></span>
            </span>
          </div>
        </a>
      </div>
    </div>
  </body>
</html>
