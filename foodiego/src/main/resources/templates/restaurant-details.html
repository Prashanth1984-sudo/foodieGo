<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${restaurant.name}">Restaurant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" th:href="@{/css/restaurant-details.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <nav class="navbar">
      <a href="/dashboard" class="back-btn"> ← Back </a>

      <div class="logo">🍔 FoodieGo</div>
    </nav>
    <section class="restaurant-hero">
      <img
        src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=2000"
        alt="Restaurant Banner"
      />

      <div class="hero-overlay"></div>

      <div class="hero-content">
        

        <h1 th:text="${restaurant.name}">Restaurant Name</h1>

        <p th:text="${restaurant.description}">Restaurant Description</p>

        <div class="restaurant-meta">
          <span>
            ⭐
            <span th:text="${restaurant.rating}"> 4.9 </span>
          </span>

          <span th:text="${restaurant.cuisine}"> Cuisine </span>

          <span>
            🚚
            <span th:text="${restaurant.deliveryTime}"> </span>
          </span>
        </div>
      </div>
    </section>

    <section class="offers">
      <div class="offer-card">🎉 20% OFF up to ₹150</div>

      <div class="offer-card">🚚 Free Delivery</div>

      <div class="offer-card">⭐ Top Rated Partner</div>
    </section>

    <section class="menu-section">
      <div class="menu-header">
        <h2>Popular Dishes</h2>

        <div class="categories">
          <button>All</button>
          <button>Biryani</button>
          <button>Starters</button>
          <button>Drinks</button>
          <button>Desserts</button>
        </div>
      </div>

      <div class="content-wrapper">
        <div class="menu-grid">
          <div class="menu-card" th:each="item : ${menuItems}">
            <img th:src="${item.imageUrl}" th:alt="${item.name}" />

            <div class="menu-info">
              <h3 th:text="${item.name}">Food Name</h3>

              <p th:text="${item.description}">Description</p>

              <div class="menu-footer">
                <span class="price">
                  ₹<span th:text="${item.price}"> </span>
                </span>

                <button
                  class="add-btn"
                  th:attr="data-id=${item.id},
             data-restaurant=${restaurant.id}"
                  onclick="addToCart(this)"
                >
                  Add +
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div id="toast">Added To Cart 🛒</div>

    <script th:inline="javascript">
      function addToCart(button) {
        const menuItemId = button.dataset.id;

        const restaurantId = button.dataset.restaurant;

        const itemName = button
          .closest(".menu-card")
          .querySelector("h3").innerText;

        fetch(`/cart/add/${menuItemId}`, {
          method: "POST",

          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },

          body: `restaurantId=${restaurantId}`,
        })
          .then((response) => response.text())
          .then(() => {
            showCartBar(itemName);

            button.innerHTML = "✓ Added";

            button.style.background = "#22c55e";

            setTimeout(() => {
              button.innerHTML = "Add +";

              button.style.background = "";
            }, 1500);
          });
      }

      function showCartBar(itemName) {
        const cartBar = document.getElementById("cart-bar");

        const cartCount = document.getElementById("cart-count");

        cartCount.innerHTML = itemName + " added";

        cartBar.classList.add("active");

        setTimeout(() => {
          cartBar.classList.remove("active");
        }, 4000);
      }
    </script>
    <div id="cart-bar">
      <div class="cart-bar-left">
        <strong> ✓ Added To Cart </strong>

        <span id="cart-count"> Item Added Successfully </span>
      </div>

      <a href="/cart" class="view-cart-btn"> 🛍 View Cart → </a>
    </div>
    <a href="/cart" class="floating-cart">

    <span class="cart-icon">
        🛍
    </span>

    <span class="cart-text">
    View Cart →
</span>

</a>
    </a>
  </body>
</html>
