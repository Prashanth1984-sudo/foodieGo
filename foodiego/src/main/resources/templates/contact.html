<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Contact Us | FoodieGo</title>

    <link rel="stylesheet" th:href="@{/css/info-pages.css}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="page">
      <div class="card">
        <div class="icon">
          <i class="fa-solid fa-headset"></i>
        </div>

        <h1>Contact Us</h1>

        <p>
          We'd love to hear from you. Feel free to contact us for support,
          feedback or business enquiries.
        </p>

        <div class="contact-info">
          <div class="contact-card">
            <h3>
              <i class="fa-solid fa-envelope"></i>

              Email
            </h3>

            <p>support@foodiego.com</p>
          </div>

          <div class="contact-card">
            <h3>
              <i class="fa-solid fa-phone"></i>

              Phone
            </h3>

            <p>+91 90592 37125</p>
          </div>

          <div class="contact-card">
            <h3>
              <i class="fa-solid fa-location-dot"></i>

              Address
            </h3>

            <p>Bengaluru, Karnataka, India</p>
          </div>

          <div class="contact-card">
            <h3>
              <i class="fa-solid fa-clock"></i>

              Support Hours
            </h3>

            <p>
              Monday – Sunday

              <br />

              9:00 AM – 10:00 PM
            </p>
          </div>
        </div>

        <a href="/dashboard" class="back-btn">
          <i class="fa-solid fa-arrow-left"></i>

          Back to Home
        </a>
      </div>
    </div>
  </body>
</html>
