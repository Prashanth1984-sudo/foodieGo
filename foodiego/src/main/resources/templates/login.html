<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FoodieGo Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" th:href="@{/css/fonts.css}" />

    <link rel="stylesheet" th:href="@{/css/auth-v3.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="overlay"></div>

    <div class="login-card">
      <div class="brand">
        <h1>🍔 FoodieGo</h1>

        <p>India's fastest growing food delivery platform</p>
      </div>

      <h2>Welcome Back</h2>

      <p class="subtitle">Login to continue your delicious journey</p>

      <div th:if="${error == 'invalidCredentials'}" class="error">
        Invalid email or password
      </div>

      <form action="/login" method="post">
        <input type="email" name="email" placeholder="Email Address" required />

        <div class="password-container">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />

          <span class="toggle-password" onclick="togglePassword()"> show </span>
        </div>

        <a href="/forgot-password" class="forgot-link"> Forgot Password? </a>

        <button type="submit">Login</button>
      </form>

      <div class="signup-link">
        <a href="/"> Create New Account </a>
      </div>
    </div>
    <script>
      function togglePassword() {
        const password = document.getElementById("password");

        password.type = password.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
