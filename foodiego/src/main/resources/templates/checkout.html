<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xml:lang="en">
  <head>
    <title>Checkout</title>

    <link rel="stylesheet" th:href="@{/css/checkout.css}" />
  </head>

  <body>
    <div class="container">
      <h1>Checkout</h1>

      <form action="/checkout/place-order" method="post">
        <div class="price-summary">
          <div class="price-row">
            <span>Subtotal</span>
            <span>₹<span id="subtotal" th:text="${subtotal}">0</span></span>
          </div>

          <div class="price-row">
            <span>Discount</span>
            <span class="discount-text">
              -₹<span id="discount" th:text="${discount}">0</span>
            </span>
          </div>

          <div class="price-row total-row">
            <span>Total</span>
            <span>
              ₹<span id="finalTotal" th:text="${finalTotal}">0</span>
            </span>
          </div>
        </div>
        <div th:if="${error == 'welcome20'}" class="coupon-error">
          WELCOME20 is only valid for your first order.
        </div>

        <div th:if="${error == 'food50'}" class="coupon-error">
          FOOD50 requires a minimum order value of ₹499.
        </div>

        <div th:if="${error == 'invalid'}" class="coupon-error">
          Invalid coupon code.
        </div>
        <div class="coupon-box">
          <label for="couponCode">Coupon Code</label>

          <div class="coupon-row">
            <input
              type="text"
              name="couponCode"
              id="couponCode"
              placeholder="Enter Coupon Code"
            />

            <button type="button" onclick="applyCoupon()">Apply</button>
          </div>
        </div>
        <div class="address-section">
          <h3>Select Delivery Address</h3>

          <div th:if="${hasAddresses}">
            <div class="address-list">
              <label class="address-card" th:each="address : ${addresses}">
                <input
                  type="radio"
                  name="addressId"
                  th:value="${address.id}"
                  required
                />

                <div class="address-info">
                  <h4 th:text="${address.fullName}">Recipient name</h4>

                  <p th:text="${address.addressLine}"></p>

                  <p>
                    <span th:text="${address.city}"> </span>

                    ,

                    <span th:text="${address.state}"> </span>

                    -

                    <span th:text="${address.pincode}"> </span>
                  </p>
                </div>
              </label>
            </div>
          </div>

          <div class="no-address-card" th:if="${!hasAddresses}">
            <h4>📍 Delivery Address Required</h4>

            <p>Please add a delivery address before placing an order.</p>

            <a href="/profile/addresses" class="add-address-btn">
              Add Address
            </a>
          </div>
        </div>
        <button
          type="submit"
          th:disabled="${!hasAddresses}"
          class="place-order-btn"
        >
          Place Order
        </button>
      </form>
    </div>
    <script>
      function applyCoupon() {
        const subtotal = parseFloat(
          document.getElementById("subtotal").innerText,
        );

        const code = document.getElementById("couponCode").value.toUpperCase();

        let discount = 0;

        if (code === "FOOD50") {
          if (subtotal >= 499) {
            discount = 50;
          } else {
            alert("FOOD50 is valid only for orders above ₹499");
            return;
          }
        } else if (code === "WELCOME20") {
          discount = subtotal * 0.2;
        } else {
          alert("Invalid Coupon Code");
          return;
        }

        const finalTotal = subtotal - discount;

        document.getElementById("discount").innerText = discount.toFixed(2);

        document.getElementById("finalTotal").innerText = (
          subtotal - discount
        ).toFixed(2);
      }
    </script>
  </body>
</html>
