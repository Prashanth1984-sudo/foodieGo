<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xml:lang="en">
  <head>
    <title>Checkout</title>

    <link rel="stylesheet" th:href="@{/css/checkout.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.jpg}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="container">
      <h1>Checkout</h1>

      <form action="/checkout/place-order" method="post">
        <div class="price-summary">
          <div class="price-row">
            <span>Subtotal</span>
            <span>₹<span id="subtotal" th:text="${subtotal}">0</span></span>
          </div>

          <div class="price-row">
            <span>Discount</span>
            <span class="discount-text">
              -₹<span id="discount" th:text="${discount}">0</span>
            </span>
          </div>

          <div class="price-row total-row">
            <span>Total</span>
            <span>
              ₹<span id="finalTotal" th:text="${finalTotal}">0</span>
            </span>
          </div>
        </div>

        <div class="coupon-box">
          <label for="couponCode"> Coupon Code </label>

          <div class="coupon-section">
            <div id="couponMessage"></div>
            <div class="coupon-row">
              <input
                type="text"
                id="couponCode"
                placeholder="Enter Coupon Code"
              />

              <button type="button" id="applyBtn" onclick="applyCoupon()">
                Apply
              </button>
            </div>

            <input type="hidden" id="appliedCoupon" name="couponCode" />
          </div>
        </div>
        <div class="address-section">
          <h3>Select Delivery Address</h3>

          <input
            type="hidden"
            id="selectedAddressId"
            name="addressId"
            th:value="${hasAddresses ? addresses[0].id : ''}"
          />

          <!-- Saved Addresses -->

          <div th:if="${!hasAddresses}">
            <p class="empty-address-msg">
              No saved address found. Add one below to continue.
            </p>
          </div>

          <div th:if="${hasAddresses}" class="saved-addresses">
            <div class="address-list">
              <label
                class="address-card"
                th:each="address, addressStat : ${addresses}"
              >
                <input
                  type="radio"
                  name="addressId"
                  th:value="${address.id}"
                  th:checked="${addressStat.index == 0}"
                  required
                />

                <div class="address-info">
                  <h4 th:text="${address.fullName}"></h4>

                  <p th:text="${address.addressLine}"></p>

                  <p>
                    <span th:text="${address.city}"></span>,
                    <span th:text="${address.state}"></span>
                    -
                    <span th:text="${address.pincode}"></span>
                  </p>

                  <small>
                    📞
                    <span th:text="${address.phone}"></span>
                  </small>
                </div>
              </label>
            </div>

            <button
              type="button"
              class="add-new-address-btn"
              onclick="toggleAddressForm()"
            >
              + Add New Address
            </button>
          </div>

          <!-- Add Address Form -->

          <div
            id="addressFormContainer"
            th:style="${hasAddresses} ? 'display:none;' : 'display:block;'"
          >
            <div class="checkout-address-form">
              <h3>Add Delivery Address</h3>

              <div id="newAddressForm">
                <div class="form-grid">
                  <input
                    type="text"
                    id="fullName"
                    placeholder="Full Name"
                    pattern="[A-Za-z ]{3,50}"
                  />

                  <input
                    type="tel"
                    id="phone"
                    placeholder="Phone Number"
                    pattern="[0-9]{10}"
                    maxlength="10"
                  />

                  <textarea
                    id="addressLine"
                    placeholder="Flat / House No, Street Name, Area, Landmark"
                  ></textarea>

                  <input
                    type="text"
                    id="city"
                    placeholder="City"
                    pattern="[A-Za-z ]+"
                  />

                  <input
                    type="text"
                    id="state"
                    placeholder="State"
                    pattern="[A-Za-z ]+"
                  />

                  <input
                    type="text"
                    id="pincode"
                    placeholder="Pincode"
                    pattern="[0-9]{6}"
                    maxlength="6"
                  />
                </div>

                <button
                  type="button"
                  class="save-address-btn"
                  onclick="saveAndUseAddress()"
                >
                  Save & Use Address
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="payment-section">
          <h3>💳 Select Payment Method</h3>

          <label class="payment-card">
            <input
              type="radio"
              name="paymentMethod"
              value="COD"
              checked
              onchange="toggleUPI()"
            />

            <div class="payment-content">
              <span class="payment-icon">💵</span>
              <div>
                <h4>Cash On Delivery</h4>
                <p>Pay when your order arrives</p>
              </div>
            </div>
          </label>

          <label class="payment-card">
            <input
              type="radio"
              name="paymentMethod"
              value="UPI"
              onchange="toggleUPI()"
            />

            <div class="payment-content">
              <span class="payment-icon">📱</span>
              <div>
                <h4>UPI Payment</h4>
                <p>Fast & secure payments</p>
              </div>
            </div>
          </label>

          <div id="upiApps" class="upi-apps">
            <div class="upi-grid">
              <label class="upi-card">
                <input type="radio" name="upiApp" value="Google Pay" />

                <img src="/images/gpay.jpg" alt="Google Pay" />

                <span>Google Pay</span>
              </label>

              <label class="upi-card">
                <input type="radio" name="upiApp" value="PhonePe" />

                <img src="/images/phonepe.jpg" alt="PhonePe" />

                <span>PhonePe</span>
              </label>

              <label class="upi-card">
                <input type="radio" name="upiApp" value="Paytm" />

                <img src="/images/paytm.jpg" alt="Paytm" />

                <span>Paytm</span>
              </label>

              <label class="upi-card">
                <input type="radio" name="upiApp" value="BHIM" />

                <img src="/images/bhim.jpg" alt="BHIM" />

                <span>BHIM</span>
              </label>
            </div>
          </div>

          <label class="payment-card">
            <input
              type="radio"
              name="paymentMethod"
              value="CARD"
              onchange="toggleUPI()"
            />

            <div class="payment-content">
              <span class="payment-icon">💳</span>
              <div>
                <h4>Credit / Debit Card</h4>
                <p>Visa, Mastercard, RuPay</p>
              </div>
            </div>
          </label>

          <label class="payment-card">
            <input
              type="radio"
              name="paymentMethod"
              value="NETBANKING"
              onchange="toggleUPI()"
            />

            <div class="payment-content">
              <span class="payment-icon">🏦</span>
              <div>
                <h4>Net Banking</h4>
                <p>All major banks supported</p>
              </div>
            </div>
          </label>
        </div>

        <input type="hidden" name="paymentId" id="paymentId" />
        <input type="hidden" name="razorpayOrderId" id="razorpayOrderId" />

        <button type="button" class="place-order-btn" onclick="payNow()">
          Pay & Place Order
        </button>
      </form>
    </div>
    <div id="toast" class="toast">Address saved successfully ✓</div>
    <script>
      function toggleAddressForm() {
        const form = document.getElementById("addressFormContainer");

        form.style.display = form.style.display === "none" ? "block" : "none";
      }

      document.addEventListener("DOMContentLoaded", function () {
        document
          .querySelectorAll("input[name='addressId']")
          .forEach((radio) => {
            radio.addEventListener("change", function () {
              document.getElementById("selectedAddressId").value = this.value;
            });
          });

        const form = document.querySelector(
          "form[action='/checkout/place-order']",
        );

        if (form) {
          form.addEventListener("submit", function (e) {
            const addressId =
              document.getElementById("selectedAddressId").value;

            if (!addressId) {
              e.preventDefault();

              alert("Please select or add a delivery address.");
            }
          });
        }
      });

      function applyCoupon() {
        const couponCode = document.getElementById("couponCode").value.trim();

        const msg = document.getElementById("couponMessage");

        if (!couponCode) {
          msg.className = "coupon-error";

          msg.innerHTML = "❌ Please enter a coupon code";

          msg.style.display = "block";

          return;
        }

        fetch("/checkout/validate-coupon", {
          method: "POST",

          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },

          body: "couponCode=" + encodeURIComponent(couponCode),
        })
          .then((response) => response.json())

          .then((data) => {
            if (data.success) {
              msg.className = "coupon-success";

              msg.innerHTML = "✅ " + data.message;

              msg.style.display = "block";

              document.getElementById("discount").innerText =
                data.discount.toFixed(2);

              document.getElementById("finalTotal").innerText =
                data.finalTotal.toFixed(2);

              document.getElementById("appliedCoupon").value =
                couponCode.toUpperCase();
            } else {
              msg.className = "coupon-error";

              msg.innerHTML = "❌ " + data.message;

              msg.style.display = "block";

              document.getElementById("discount").innerText = "0";

              document.getElementById("finalTotal").innerText =
                document.getElementById("subtotal").innerText;

              document.getElementById("appliedCoupon").value = "";
            }
          })

          .catch(() => {
            msg.className = "coupon-error";

            msg.innerHTML = "❌ Something went wrong";

            msg.style.display = "block";
          });
      }

      function saveAndUseAddress() {
        const formData = new FormData();

        formData.append("fullName", document.getElementById("fullName").value);

        formData.append("phone", document.getElementById("phone").value);

        formData.append(
          "addressLine",
          document.getElementById("addressLine").value,
        );

        formData.append("city", document.getElementById("city").value);

        formData.append("state", document.getElementById("state").value);

        formData.append("pincode", document.getElementById("pincode").value);

        fetch("/checkout/add-address", {
          method: "POST",
          body: formData,
        })
          .then((response) => response.text())
          .then(() => {
            const toast = document.getElementById("toast");

            toast.classList.add("show");

            setTimeout(() => {
              toast.classList.remove("show");
            }, 2500);

            setTimeout(() => {
              location.reload();
            }, 1000);

            location.reload();
          })
          .catch((error) => {
            console.error(error);

            alert("Failed to save address");
          });
        document.getElementById("addressFormContainer").style.display = "none";
      }
    </script>
    <script>
      function toggleUPI() {
        const upiSelected =
          document.querySelector('input[value="UPI"]').checked;

        document.getElementById("upiApps").style.display = upiSelected
          ? "block"
          : "none";
      }

      let paymentMethod = document.querySelector(
        'input[name="paymentMethod"]:checked',
      ).value;

      if (paymentMethod === "UPI") {
        const upiApp = document.querySelector('input[name="upiApp"]:checked');

        paymentMethod = upiApp.value + " UPI";
      }

      document.getElementById("paymentMethodHidden").value = paymentMethod;
    </script>

    <!-- Add Subresource Integrity (SRI) and crossorigin; replace the integrity value with the actual SHA384 hash for the remote script or host the file locally -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      async function payNow() {
        const paymentMethod = document.querySelector(
          'input[name="paymentMethod"]:checked',
        ).value;

        // COD → Direct Order Placement
        if (paymentMethod === "COD") {
          document.querySelector("form").submit();
          return;
        }

        const response = await fetch("/checkout/create-order", {
          method: "POST",
        });

        const order = await response.json();

        const options = {
          key: "rzp_test_T4lXtogd3BAbaH",

          amount: order.amount,

          currency: order.currency,

          order_id: order.id,

          name: "FoodieGo",

          description: "Food Order Payment",

          handler: function (response) {
            document.getElementById("paymentId").value =
              response.razorpay_payment_id;

            document.getElementById("razorpayOrderId").value =
              response.razorpay_order_id;

            document.querySelector("form").submit();
          },
        };

        const rzp = new Razorpay(options);

        rzp.open();
      }

      function handlePayment() {
        const paymentMethod = document.querySelector(
          'input[name="paymentMethod"]:checked',
        ).value;

        if (paymentMethod === "COD") {
          document.querySelector("form").submit();
        } else {
          payNow();
        }
      }
    </script>
  </body>
</html>
