<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Coupon Management | FoodieGo Admin</title>

    <link rel="stylesheet" th:href="@{/css/admin-coupons.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="layout">
      <div class="main">
        <h1>🎟 Coupon Management</h1>

        <div class="coupon-top">
          <a href="/admin/coupons/add" class="add-btn">
            <i class="fa-solid fa-plus"></i>

            Add Coupon
          </a>
        </div>

        <div class="coupon-table">
          <table>
            <thead>
              <tr>
                <th>ID</th>

                <th>Coupon Code</th>

                <th>Discount</th>

                <th>Status</th>

                <th>Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="coupon : ${coupons}">
                <td th:text="${coupon.id}"></td>

                <td>
                  <span class="coupon-code" th:text="${coupon.code}"></span>
                </td>

                <td>
                  <span th:if="${coupon.discountAmount != null}">
                    ₹<span th:text="${coupon.discountAmount}"></span>
                  </span>

                  <span th:if="${coupon.discountPercent != null}">
                    <span th:text="${coupon.discountPercent}"></span>%
                  </span>
                </td>

                <td>
                  <span class="status active" th:if="${coupon.active}">
                    Active
                  </span>

                  <span class="status inactive" th:unless="${coupon.active}">
                    Inactive
                  </span>
                </td>

                <td class="actions">
                  <a
                    th:href="@{/admin/coupons/edit/{id}(id=${coupon.id})}"
                    class="edit"
                  >
                    <i class="fa-solid fa-pen"></i>
                  </a>

                  <a
                    th:href="@{/admin/coupons/delete/{id}(id=${coupon.id})}"
                    class="delete"
                    onclick="
                      return confirm(
                        'Are you sure you want to delete this coupon?',
                      );
                    "
                  >
                    <i class="fa-solid fa-trash"></i>
                  </a>
                </td>
              </tr>

              <tr th:if="${#lists.isEmpty(coupons)}">
                <td colspan="5" class="empty">No coupons found.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
