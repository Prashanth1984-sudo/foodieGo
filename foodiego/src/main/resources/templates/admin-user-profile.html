<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>User Profile | FoodieGo Admin</title>

    <link rel="stylesheet" th:href="@{/css/admin-user-profile.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="container">
      <a href="/admin/users" class="back-btn"> ← Back to Users </a>

      <div class="profile-card">
        <img
          th:src="${user.profileImage != null ? user.profileImage : '/images/default-user.png'}"
          class="avatar"
        />

        <h1 th:text="${user.name}"></h1>

        <p th:text="${user.email}"></p>

        <div class="info">
          <div>
            <strong>User ID</strong>
            <span th:text="${user.id}"></span>
          </div>

          <div>
            <strong>Role</strong>
            <span th:text="${user.role}"></span>
          </div>

          <div>
            <strong>Status</strong>

            <span th:if="${user.enabled}" class="active"> Active </span>

            <span th:unless="${user.enabled}" class="blocked"> Blocked </span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
