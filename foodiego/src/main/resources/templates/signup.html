<!doctype html>
<html lang="en" xml:lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FoodieGo Signup</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/auth-v3.css}" />
  </head>

  <body>
    <div class="overlay"></div>

    <div class="login-card">
      <div class="brand">
        <h1>🍔 FoodieGo</h1>

        <p><p>
    Join thousands of food lovers today
</p></p>
      </div>

      <h2>Create Account</h2>

      <p class="subtitle">Join FoodieGo and discover amazing food</p>

      <div th:if="${error == 'emailExists'}" class="error">
        Email already exists
      </div>

      <div th:if="${error == 'passwordMismatch'}" class="error">
        Passwords do not match
      </div>

      <form action="/register" method="post">
        <input type="text" name="name" placeholder="Full Name" required />

        <input type="email" name="email" placeholder="Email Address" required />

        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />

        <input
          type="password"
          name="confirmPassword"
          placeholder="Confirm Password"
          required
        />

        <button type="submit">Create Account</button>
      </form>

      <div class="signup-link">
        <a href="/login"> Already have an account? Login </a>
      </div>
    </div>
  </body>
</html>
