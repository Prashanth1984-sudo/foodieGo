<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Edit Address | FoodieGo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/addresses.css}" />
    <link rel="shortcut icon" th:href="@{/images/fevicon.png}" />
  </head>

  <body>
    <div class="addresses-page">
      <div class="page-header">
        <div>
          <span class="page-tag"> FOODIEGO </span>

          <h1>Edit Address</h1>

          <p class="subtitle">Update your delivery address information.</p>
        </div>

        <a href="/profile/addresses" class="back-btn"> Back </a>
      </div>

      <div class="add-address-card">
        <h2>Update Address</h2>

        <div th:if="${param.error == 'name'}" class="error-message">
          Invalid full name.
        </div>

        <div th:if="${param.error == 'phone'}" class="error-message">
          Enter a valid 10-digit phone number.
        </div>

        <div th:if="${param.error == 'pincode'}" class="error-message">
          Enter a valid 6-digit pincode.
        </div>

        <div th:if="${param.error == 'city'}" class="error-message">
          Invalid city name.
        </div>

        <div th:if="${param.error == 'state'}" class="error-message">
          Invalid state name.
        </div>

        <div th:if="${param.error == 'address'}" class="error-message">
          Address must be at least 10 characters long.
        </div>

        <form th:action="@{/profile/addresses/update}" method="post">
          <input type="hidden" name="id" th:value="${address.id}" />
          <input
            type="hidden"
            name="userEmail"
            th:value="${address.userEmail}"
          />

          <div class="form-grid">
            <input
              type="text"
              name="fullName"
              placeholder="Full Name"
              th:value="${address.fullName}"
              pattern="^[A-Za-z ]{3,50}$"
              title="Only letters and spaces allowed"
              required
            />

            <input
              type="text"
              name="phone"
              placeholder="Phone Number"
              th:value="${address.phone}"
              pattern="[0-9]{10}"
              maxlength="10"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              title="Enter a valid 10 digit phone number"
              required
            />

            <textarea
              name="addressLine"
              placeholder="Flat / House No, Street Name, Area, Landmark..."
              minlength="10"
              maxlength="200"
              required
              th:text="${address.addressLine}"
            ></textarea>

            <input
              type="text"
              name="city"
              placeholder="City"
              th:value="${address.city}"
              pattern="^[A-Za-z ]+$"
              oninput="this.value = this.value.replace(/[^a-zA-Z ]/g, '')"
              title="Only letters allowed"
              required
            />

            <input
              type="text"
              name="state"
              placeholder="State"
              th:value="${address.state}"
              pattern="^[A-Za-z ]+$"
              oninput="this.value = this.value.replace(/[^a-zA-Z ]/g, '')"
              title="Only letters allowed"
              required
            />

            <input
              type="text"
              name="pincode"
              placeholder="Pincode"
              th:value="${address.pincode}"
              pattern="[0-9]{6}"
              maxlength="6"
              oninput="this.value = this.value.replace(/[^0-9]/g, '')"
              title="Enter a valid 6 digit pincode"
              required
            />
          </div>

          <button type="submit">Update Address</button>
        </form>
      </div>
    </div>
  </body>
</html>
